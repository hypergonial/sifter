name: Build Crate

on:
  workflow_call:
    inputs:
      crate-name:
        required: true
        type: string
      working-directory:
        required: false
        type: string
        default: .
      toolchain:
        required: false
        type: string
        default: stable
      ref:
        required: false
        type: string

jobs:
  # Build sources for every OS
  github_build:
    name: Build release binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: aarch64-unknown-linux-musl.tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: x86_64-unknown-linux-gnu.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: x86_64-unknown-linux-musl.tar.gz
          - target: x86_64-apple-darwin
            os: macOS-latest
            name: x86_64-apple-darwin.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: x86_64-pc-windows-msvc.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup | Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ inputs.toolchain }}
          target: ${{ matrix.target }}

      - name: Setup | cross
        if: endsWith(matrix.target, '-unknown-linux-musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build | Build
        if: ${{ !endsWith(matrix.target, '-unknown-linux-musl') }}
        working-directory: ${{ inputs.working-directory }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build | Build (musl)
        if: endsWith(matrix.target, '-unknown-linux-musl')
        working-directory: ${{ inputs.working-directory }}
        run: cross build --release --target ${{ matrix.target }}

      - name: "Post Setup | Extract tag name"
        shell: bash
        run: |
          tag=$(echo ${GITHUB_REF#refs/tags/})
          echo "tag=$tag" >> $GITHUB_OUTPUT
        id: extract_tag

      - name: Post Setup | Prepare artifacts [Windows]
        if: matrix.os == 'windows-latest'
        working-directory: ${{ inputs.working-directory }}
        run: |
          mkdir target/stage
          cd target/${{ matrix.target }}/release
          7z a ../../stage/${{ inputs.crate-name }}-${{ steps.extract_tag.outputs.tag }}-${{ matrix.name }} ${{ inputs.crate-name }}.exe
          cd -
      - name: Post Setup | Prepare artifacts [-nix]
        if: matrix.os != 'windows-latest'
        working-directory: ${{ inputs.working-directory }}
        run: |
          mkdir target/stage
          cd target/${{ matrix.target }}/release
          tar czvf ../../stage/${{ inputs.crate-name }}-${{ steps.extract_tag.outputs.tag }}-${{ matrix.name }} ${{ inputs.crate-name }}
          cd -
      - name: Post Setup | Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.crate-name }}-${{ steps.extract_tag.outputs.tag }}-${{ matrix.name }}
          path: ${{ inputs.working-directory }}/target/stage/*
          overwrite: true
          retention-days: 1
