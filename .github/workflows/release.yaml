# Based on https://github.com/tommilligan/mdbook-admonish/blob/main/.github/workflows/deploy.yml

name: Deploy
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v0.1.0)"
        required: true

env:
  RUST_VERSION: stable
  UV_VERSION: 0.11
  PYTHON_VERSION: 3.13

jobs:
  init:
    name: Bump project version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse_version.outputs.version }}
      major: ${{ steps.parse_version.outputs.major }}
      minor: ${{ steps.parse_version.outputs.minor }}
      patch: ${{ steps.parse_version.outputs.patch }}
    steps:
      - name: Parse version
        id: parse_version
        shell: bash
        env:
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Version must be in the format vX.Y.Z"
            exit 1
          fi

          version=$(echo $VERSION | tr -d 'v')
          major=$(echo $VERSION | cut -d. -f1 | tr -d 'v')
          minor=$(echo $VERSION | cut -d. -f2)
          patch=$(echo $VERSION | cut -d. -f3)

          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "major=$major" >> $GITHUB_OUTPUT
          echo "minor=$minor" >> $GITHUB_OUTPUT
          echo "patch=$patch" >> $GITHUB_OUTPUT

      # Prevent creating releases from non-default branches when manually triggered
      - name: Check if on default branch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          CURRENT_BRANCH: ${{ github.ref_name }}
        run: |
          if [ "$CURRENT_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "Error: Current branch $CURRENT_BRANCH is not the default branch $DEFAULT_BRANCH"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-tags: true

      # Prevent clobbering new tags pushed to old releases
      - name: Check if tag is on default branch
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          tag_commit="$(git rev-parse "${TAG}^{}")"
          branch_head="$(git rev-parse "origin/${DEFAULT_BRANCH}")"

          if [ "$tag_commit" != "$branch_head" ]; then
            echo "Error: Tag $TAG is not the tip of the $DEFAULT_BRANCH branch"
            exit 1
          fi

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-edit
        run: cargo install cargo-edit --no-default-features --features "set-version"

      - name: Bump version
        run: cargo set-version ${{ steps.parse_version.outputs.version }}

      - name: Push changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -am "Bump version to ${{ steps.parse_version.outputs.version }}" || exit 0
          git tag -f v${{ steps.parse_version.outputs.version }}
          git push origin ${{ github.event.repository.default_branch }} --tags --force

  build_crate_bins:
    name: Build crate binaries
    needs: init
    uses: ./.github/workflows/build-crate-bin.yaml
    strategy:
      fail-fast: true
      matrix:
        crate:
          - "sosaku-cli"
    with:
      crate-name: ${{ matrix.crate }}
      working-directory: ${{ matrix.crate }}
      ref: ${{ github.event.repository.default_branch }}

  build_py_wheels:
    name: Build Python wheels
    needs: init
    uses: ./.github/workflows/build-py-wheel.yaml
    strategy:
      fail-fast: true
      matrix:
        package:
          - "sosaku-py"
    with:
      package-name: ${{ matrix.package }}
      working-directory: ${{ matrix.package }}
      ref: ${{ github.event.repository.default_branch }}

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build_crate_bins, build_py_wheels]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: RELEASE.md
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github_release
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - name: Download run artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: "wheels-*"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "wheels-*/*"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Publish to PyPI
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  # Upload to crates.io
  publish-crates-io:
    name: Publish to crates.io
    needs: github_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Publish crate
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
